<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

        <div class="sidebar-menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/admin/admin_dashboard}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Dashboard</a>
            <a th:href="@{/admin/user/allUsers}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Manage Users</a>
            <a th:href="@{/admin/task/allTasks}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Tasks</a>
            <a th:href="@{/admin/attendance/allRecords}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Attendance Reports</a>
            <a th:href="@{/admin/performance/details}" class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition">Performance Reports</a>

            <a th:href="@{/admin/settings/page}"
               class="menu-item active menu-link whitespace-nowrap px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                Settings
            </a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">Settings</div>
                <div class="sub-welcome text-gray-500 text-sm">Manage your account preferences</div>
            </div>

            <a th:href="@{/admin/admin_dashboard}"
               class="logout-btn menu-link w-full sm:w-auto text-center px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 transition shadow-sm">
                Back
            </a>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-5">

            <div class="section-title font-semibold text-lg mb-5">Profile Information</div>

            <form class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Name</label>
                    <input type="text" th:value="${user.fullName}" readonly
                           class="px-3 py-2 border rounded-lg bg-gray-100 text-sm focus:outline-none">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Email</label>
                    <input type="email" th:value="${user.email}" readonly
                           class="px-3 py-2 border rounded-lg bg-gray-100 text-sm focus:outline-none">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Username</label>
                    <input type="text" th:value="${user.username}" readonly
                           class="px-3 py-2 border rounded-lg bg-gray-100 text-sm focus:outline-none">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Role</label>
                    <input type="text" th:value="${user.role}" readonly
                           class="px-3 py-2 border rounded-lg bg-gray-100 text-sm focus:outline-none">
                </div>

            </form>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-5">

            <div class="section-title font-semibold text-lg mb-5">Change Password</div>

            <form id="passwordForm" th:action="@{/admin/settings/changePassword}" method="post"
                  class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Current Password</label>
                    <input type="password" name="currentPassword" required
                           class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">New Password</label>
                    <input type="password" name="newPassword" required
                           class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Confirm Password</label>
                    <input type="password" name="confirmPassword" required
                           class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="btn-section col-span-1 md:col-span-2 flex flex-col sm:flex-row sm:justify-end gap-3 mt-2">

                    <button type="submit"
                            class="view-btn w-full sm:w-auto px-4 py-2 rounded-lg text-white font-medium
                                   bg-gradient-to-r from-indigo-500 to-purple-500
                                   hover:from-indigo-600 hover:to-purple-600
                                   transition transform hover:scale-[1.02] active:scale-95 shadow">
                        Save Changes
                    </button>

                    <a th:href="@{/admin/admin_dashboard}"
                       class="view-btn menu-link w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>
<script>

    const form = document.getElementById("passwordForm");

    form.addEventListener("submit", function(e){

        e.preventDefault(); // stop default submit

        const currentPassword = form.querySelector("input[name='currentPassword']").value;
        const newPassword = form.querySelector("input[name='newPassword']").value;
        const confirmPassword = form.querySelector("input[name='confirmPassword']").value;


        if(newPassword.length < 8){
            Swal.fire({
                icon: 'error',
                title: 'Invalid Password',
                text: 'Password must be at least 8 characters'
            });
            return;
        }

        if(newPassword !== confirmPassword){
            Swal.fire({
                icon: 'error',
                title: 'Mismatch',
                text: 'Passwords do not match'
            });
            return;
        }


        Swal.fire({
            title: 'Save Changes?',
            text: 'Your password will be updated',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Save',
            reverseButtons: true
        }).then((result) => {

            if(result.isConfirmed){

                fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        currentPassword: currentPassword,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    })
                })
                .then(res => {
                    if(!res.ok) throw new Error();

                    Swal.fire({
                        icon: 'success',
                        title: 'Password Updated',
                        showConfirmButton: false,
                        timer: 1500
                    });

                    setTimeout(() => {
                        form.reset();
                    }, 1500);

                })
                .catch(() => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Update Failed',
                        text: 'Please check your current password'
                    });
                });
            }
        });

    });

</script>
</body>
</html>
