<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Task</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

        <div class="sidebar-menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/admin/admin_dashboard}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Dashboard</a>
            <a th:href="@{/admin/user/allUsers}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Manage Users</a>

            <a th:href="@{/admin/task/allTasks}"
               class="menu-item active menu-link px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                Tasks
            </a>

            <a th:href="@{/admin/attendance/allRecords}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Attendance Reports</a>
            <a th:href="@{/admin/performance/details}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Performance Reports</a>
            <a th:href="@{/admin/settings/page}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Settings</a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">Assign Task</div>
                <div class="sub-welcome text-gray-500 text-sm">Assign an existing task to an employee</div>
            </div>

            <a th:href="@{/admin/task/allTasks}"
               class="logout-btn menu-link w-full sm:w-auto px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition shadow-sm text-center">
                Back
            </a>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-5">

            <div class="section-title font-semibold text-lg mb-5">Assignment</div>

            <form id="assignForm"
                  th:action="@{/admin/task/assign}" method="post"
                  class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Select Task</label>
                    <select name="taskId" id="selectTask" required
                            class="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-primary">
                        <option value="">Select Task</option>
                        <option th:each="task : ${tasks}"
                                th:value="${task.id}"
                                th:text="${task.taskTitle}">
                        </option>
                    </select>
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Assign To</label>
                    <select name="userId" required
                            class="px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-primary">
                        <option value="">Select User</option>
                        <option th:each="user : ${users}"
                                th:value="${user.id}"
                                th:text="${user.fullName}">
                        </option>
                    </select>
                </div>

                <div class="preview-section col-span-1 md:col-span-2 mt-4" id="preview-section">

                    <div class="section-title font-semibold text-lg mb-3">Task Preview</div>

                    <div class="task-item task-header hidden md:grid grid-cols-5 text-xs text-gray-500 uppercase font-semibold border-b pb-2">
                        <div>Task</div>
                        <div>Description</div>
                        <div>Deadline</div>
                        <div>Priority</div>
                        <div>Status</div>
                    </div>

                </div>

                <div class="form-actions col-span-1 md:col-span-2 flex flex-col sm:flex-row sm:justify-end gap-3 mt-2">

                    <button type="submit"
                            class="view-btn w-full sm:w-auto px-4 py-2 rounded-lg text-white font-medium
                                   bg-gradient-to-r from-indigo-500 to-purple-500
                                   hover:from-indigo-600 hover:to-purple-600
                                   transition transform hover:scale-[1.02] active:scale-95 shadow">
                        Assign Task
                    </button>

                    <a th:href="@{/admin/task/allTasks}"
                       class="view-btn menu-link w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>

<script>
    document.getElementById("selectTask").addEventListener("change", fetchTask)

    function fetchTask(){
        let taskId = document.getElementById("selectTask").value;
        if(!taskId){
            document.getElementById("preview-section").innerHTML = "";
            return;
        }
        let url = `/admin/task/${taskId}/preview`;

        fetch(url)
                .then(response => response.json())
                .then(data => displayData(data))
                .catch(error => console.log("Error:", error));
    }

    function displayData(task){
        let container = document.getElementById("preview-section");

        if(!task){
        container.innerHTML = "<p class='text-sm text-gray-500'>No data found</p>";
        return;
        }

        let html = `
            <div class="section-title font-semibold text-lg mb-3">Task Preview</div>

            <div class="task-item task-header hidden md:grid grid-cols-5 text-xs text-gray-500 uppercase font-semibold border-b pb-2">
                <div>Task</div>
                <div>Description</div>
                <div>Deadline</div>
                <div>Priority</div>
                <div>Status</div>
            </div>

            <div class="task-items-group">
                <div class="task-item flex flex-col md:grid md:grid-cols-5 gap-2 md:gap-0 py-3 border-b text-sm">
                    <div><span class="md:hidden font-medium">Task:</span> ${task.taskTitle}</div>
                    <div><span class="md:hidden font-medium">Description:</span> ${task.description}</div>
                    <div><span class="md:hidden font-medium">Deadline:</span> ${task.deadline}</div>
                    <div><span class="md:hidden font-medium">Priority:</span> ${task.priority}</div>
                    <div><span class="md:hidden font-medium">Status:</span> ${task.status}</div>
                </div>
            </div>`;
        container.innerHTML = html;
    }

    const form = document.getElementById("assignForm");

    form.addEventListener("submit", function(e){

        e.preventDefault();

        const taskId = document.querySelector("select[name='taskId']").value;
        const userId = document.querySelector("select[name='userId']").value;

        if(!taskId || !userId){
            Swal.fire({
                icon: 'error',
                title: 'Missing Fields',
                text: 'Please select both task and user'
            });
            return;
        }

        Swal.fire({
            title: 'Assign Task?',
            text: 'Do you want to assign this task to the selected user?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Assign',
            reverseButtons: true
        }).then((result) => {

            if(result.isConfirmed){
                Swal.fire({
                    icon: 'success',
                    title: 'Task Assigned',
                    showConfirmButton: false,
                    timer: 1200
                });
                setTimeout(() => {
                    form.submit();
                }, 1000);
            }
        });

    });
</script>

</body>
</html>
