<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

        <div class="sidebar-menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/admin/admin_dashboard}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Dashboard</a>
            <a th:href="@{/admin/user/allUsers}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Manage Users</a>

            <a th:href="@{/admin/task/allTasks}"
               class="menu-item active menu-link px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                Tasks
            </a>

            <a th:href="@{/admin/attendance/allRecords}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Attendance Reports</a>
            <a th:href="@{/admin/performance/details}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Performance Reports</a>
            <a th:href="@{/admin/settings/page}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Settings</a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">Task Details</div>
                <div class="sub-welcome text-gray-500 text-sm">View complete information about this task</div>
            </div>

            <a th:href="@{/admin/task/allTasks}"
               class="logout-btn menu-link w-full sm:w-auto px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition shadow-sm text-center">
                Back
            </a>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-6">

            <div class="section-title font-semibold text-lg mb-6">Task Information</div>

            <div class="info-grid grid grid-cols-1 md:grid-cols-2 gap-5">

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Task Title</div>
                    <div class="value text-sm font-medium text-gray-800 mt-1"
                         th:text="${viewTask.taskTitle}"></div>
                </div>

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Assigned To</div>
                    <div class="value text-sm font-medium text-gray-800 mt-1"
                         th:text="${viewTask.user != null ? viewTask.user.fullName : 'Unassigned'}"></div>
                </div>

                <div class="info-group md:col-span-2">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Description</div>
                    <div class="value text-sm text-gray-700 mt-1"
                         th:text="${viewTask.description}"></div>
                </div>

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Deadline</div>
                    <div class="value text-sm text-gray-800 mt-1"
                         th:text="${viewTask.deadline}"></div>
                </div>

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Priority</div>
                    <div class="value text-sm font-medium text-gray-800 mt-1"
                         th:text="${viewTask.priority}"></div>
                </div>

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</div>
                    <div class="value text-sm font-medium text-gray-800 mt-1"
                         th:text="${viewTask.status}"></div>
                </div>

                <div class="info-group">
                    <div class="label text-xs font-semibold text-gray-500 uppercase tracking-wide">Created Date</div>
                    <div class="value text-sm text-gray-800 mt-1"
                         th:text="${viewTask.createdAt}"></div>
                </div>

            </div>

            <div class="form-actions flex flex-col sm:flex-row gap-3 mt-8">

                <a th:href="@{/admin/task/{taskId}/editPage(taskId=${viewTask.id})}"
                   class="view-btn w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                    Edit
                </a>

                <a th:href="@{/admin/task/{taskId}/reassignPage(taskId=${viewTask.id})}"
                   class="view-btn w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                    Reassign
                </a>

                <a th:href="@{/admin/task/allTasks}"
                   class="view-btn w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                    Back
                </a>

            </div>

        </div>

    </div>
</div>

</body>
</html>
