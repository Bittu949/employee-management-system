<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(120deg, #eef2ff, #f8fafc, #e0e7ff);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating soft light layers */
        .bg-layer {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 18s infinite ease-in-out;
        }

        .layer1 {
            background: #6366f1;
            top: -150px;
            left: -150px;
        }

        .layer2 {
            background: #a855f7;
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        .layer3 {
            background: #22d3ee;
            top: 40%;
            left: 30%;
            animation-delay: 8s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, -60px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Card animation */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
    </style>

</head>

<body class="relative min-h-screen flex items-center justify-center overflow-hidden font-sans">

<div class="bg-layer layer1"></div>
<div class="bg-layer layer2"></div>
<div class="bg-layer layer3"></div>

<div class="relative z-10 w-full max-w-md p-8 rounded-3xl
            bg-white/70 backdrop-blur-2xl
            border border-white/30
            shadow-[0_25px_80px_rgba(0,0,0,0.15)]
            fade-in">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800 tracking-tight">
            Welcome Back
        </h1>
        <p class="text-sm text-gray-500 mt-1">
            Login to continue to your dashboard
        </p>
    </div>

    <form onsubmit="login(event)" class="space-y-5" novalidate>

        <input type="text" id="username" placeholder="Enter email" required
               class="w-full px-4 py-3 rounded-xl border border-gray-300
                      bg-white/60 backdrop-blur-sm
                      focus:outline-none focus:ring-2 focus:ring-primary
                      transition shadow-sm focus:shadow-md">

        <input type="password" id="password" placeholder="Enter password" required
               class="w-full px-4 py-3 rounded-xl border border-gray-300
                      bg-white/60 backdrop-blur-sm
                      focus:outline-none focus:ring-2 focus:ring-primary
                      transition shadow-sm focus:shadow-md">

        <button type="submit"
                class="w-full py-3 rounded-xl font-semibold text-white
                       bg-indigo-600 hover:bg-indigo-700
                       shadow-md hover:shadow-lg
                       transition-all transform hover:scale-[1.04] active:scale-95 cursor-pointer">
            Login
        </button>
    </form>

</div>

<script>
    const toastColors = {
        success: "#22c55e",
        error: "#ef4444",
        info: "#3b82f6"
    };

    function showToast(message, type = "error") {
        Toastify({
            text: message,
            duration: 3000,
            gravity: "top",
            position: "right",
            backgroundColor: toastColors[type] || toastColors.error,
            close: true
        }).showToast();
    }

    window.onload = function () {
        const params = new URLSearchParams(window.location.search);

        if (params.has("expired")) {
            showToast("Session expired. Please login again.", "error");
        }

        if (params.has("error")) {
            showToast("Invalid session. Please login again.", "error");
        }
    };

    async function login(event){
        event.preventDefault();

        let email = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();

        if (!email || !password) {
            showToast("Please fill all fields", "error");
            return;
        }

        if (!/^\S+@\S+\.\S+$/.test(email)) {
            showToast("Enter a valid email address", "error");
            return;
        }

        const btn = event.target.querySelector("button");
        btn.disabled = true;
        btn.innerText = "Logging in...";

        try {
            let response = await fetch("/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if(response.ok){
                let userRes = await fetch("/auth/me");
                let data = await userRes.json();

                showToast("Login successful", "success");

                setTimeout(() => {
                    if(data.role === "ADMIN"){
                        window.location.href = "/admin/admin_dashboard";
                    } else {
                        window.location.href = "/employee/employee_dashboard";
                    }
                }, 1200);

            } else {
                btn.disabled = false;
                btn.innerText = "Login";
                showToast("Invalid email or password", "error");
            }

        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Login";
            showToast("Server error. Try again", "error");
        }
    }
</script>

</body>
</html>
