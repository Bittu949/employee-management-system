<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 shrink-0 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

        <div class="sidebar-menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/admin/admin_dashboard}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Dashboard</a>
            <a th:href="@{/admin/user/allUsers}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Manage Users</a>

            <a th:href="@{/admin/task/allTasks}"
               class="menu-item active menu-link px-4 py-2 rounded-xl bg-indigo-100 text-indigo-700 font-medium">
                Tasks
            </a>

            <a th:href="@{/admin/attendance/allRecords}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Attendance Reports</a>
            <a th:href="@{/admin/performance/details}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Performance Reports</a>
            <a th:href="@{/admin/settings/page}" class="menu-item menu-link px-4 py-2 rounded-xl hover:bg-gray-100">Settings</a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">Edit Task</div>
                <div class="sub-welcome text-gray-500 text-sm">Update task information</div>
            </div>

            <a th:href="@{/admin/task/allTasks}"
               class="logout-btn menu-link w-full sm:w-auto px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition shadow-sm text-center">
                Back
            </a>
        </div>

        <div class="tasks-monitoring-section mt-6 bg-white rounded-2xl shadow p-5">

            <div class="section-title font-semibold text-lg mb-5">Task Details</div>

            <form id="editTaskForm"
                  th:action="@{/admin/task/edit}" method="post"
                  class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <input type="hidden" name="taskId" th:value="${task.id}">

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Task Title</label>
                    <input type="text" name="taskTitle" th:value="${task.taskTitle}"
                           class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="form-group full-width md:col-span-2 flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Description</label>
                    <textarea rows="4" name="description"
                              th:text="${task.description}"
                              class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea>
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Deadline</label>
                    <input type="date" name="deadline"
                           th:value="${#temporals.format(task.deadline, 'yyyy-MM-dd')}"
                           th:attr="min=${today}"
                           class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Priority</label>
                    <select name="priority"
                            class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="LOW" th:selected="${task.priority == 'LOW'}">Low</option>
                        <option value="MEDIUM" th:selected="${task.priority == 'MEDIUM'}">Medium</option>
                        <option value="HIGH" th:selected="${task.priority == 'HIGH'}">High</option>
                    </select>
                </div>

                <div class="form-group flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</label>
                    <select name="status"
                            class="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="PENDING" th:selected="${task.status == 'PENDING'}">Pending</option>
                        <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>
                        <option value="COMPLETED" th:selected="${task.status == 'COMPLETED'}">Completed</option>
                    </select>
                </div>

                <div class="form-actions md:col-span-2 flex flex-col sm:flex-row sm:justify-end gap-3 mt-2">

                    <button type="submit"
                            class="view-btn w-full sm:w-auto px-4 py-2 rounded-lg text-white font-medium
                                   bg-gradient-to-r from-indigo-500 to-purple-500
                                   hover:from-indigo-600 hover:to-purple-600
                                   transition transform hover:scale-[1.02] active:scale-95 shadow">
                        Update Task
                    </button>

                    <a th:href="@{/admin/task/allTasks}"
                       class="view-btn menu-link w-full sm:w-auto text-center px-4 py-2 rounded-lg border bg-white hover:bg-gray-100 transition">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>
<script>

    const form = document.getElementById("editTaskForm");

    form.addEventListener("submit", function(e){

        e.preventDefault(); // stop default submit

        const title = form.querySelector("input[name='taskTitle']").value;
        const description = form.querySelector("textarea[name='description']").value;
        const deadline = form.querySelector("input[name='deadline']").value;
        const priority = form.querySelector("select[name='priority']").value;
        const status = form.querySelector("select[name='status']").value;

        if(!title || !description || !deadline || !priority || !status){
            Swal.fire({
                icon: 'error',
                title: 'Missing Fields',
                text: 'Please fill all fields'
            });
            return;
        }

        Swal.fire({
            title: 'Update Task?',
            text: 'Do you want to save these changes?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'Update',
            reverseButtons: true
        }).then((result) => {

            if(result.isConfirmed){

                Swal.fire({
                    icon: 'success',
                    title: 'Task Updated',
                    showConfirmButton: false,
                    timer: 1200
                });

                setTimeout(() => {
                    form.submit();
                }, 1000);
            }
        });

    });

</script>
</body>
</html>
