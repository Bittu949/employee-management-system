<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-slate-100 via-white to-indigo-100 font-sans">

<div class="app flex flex-col md:flex-row min-h-screen">

    <div class="sidebar w-full md:w-64 bg-white/80 backdrop-blur-xl border-b md:border-b-0 md:border-r border-gray-200 p-4 md:p-5 shadow-sm md:shadow-lg">

        <div class="menu mt-2 md:mt-10 flex md:flex-col gap-2 overflow-x-auto md:overflow-visible">

            <a th:href="@{/employee/employee_dashboard}"
               class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition cursor-pointer">
                Dashboard
            </a>

            <a th:href="@{/employee/profile}"
               class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition cursor-pointer">
                Profile
            </a>

            <a th:href="@{/employee/attendance}"
               class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition cursor-pointer">
                Attendance
            </a>

            <a th:href="@{/employee/settings}"
               class="menu-item active menu-link whitespace-nowrap px-4 py-2 rounded-xl bg-indigo-50 text-indigo-700 font-semibold border border-indigo-100 cursor-pointer">
                Settings
            </a>

            <a th:href="@{/employee/tasks}"
               class="menu-item menu-link whitespace-nowrap px-4 py-2 rounded-xl hover:bg-gray-100 transition cursor-pointer">
                My Tasks <span th:text="${pendingTasks}">0</span>
            </a>

        </div>
    </div>

    <div class="main-content flex-1 p-4 md:p-6">

        <div class="dashboard-header flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">

            <div>
                <div class="welcome text-2xl md:text-3xl font-bold text-gray-800">
                    Settings
                </div>
                <div class="sub-welcome text-gray-500 text-sm">
                    Manage your account settings
                </div>
            </div>

            <a href="#" onclick="confirmLogout(event)"
               class="logout-btn menu-link w-full sm:w-auto text-center px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 transition shadow-sm cursor-pointer">
                Logout
            </a>
        </div>

        <div class="settings-card bg-white rounded-2xl shadow border border-gray-100 p-6 max-w-xl">

            <div class="section-title font-semibold text-lg mb-5">
                Change Password
            </div>

            <div class="space-y-4">

                <div>
                    <label class="block text-sm text-gray-500 mb-1">Current Password</label>
                    <input type="password" id="currentPassword"
                           class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div>
                    <label class="block text-sm text-gray-500 mb-1">New Password</label>
                    <input type="password" id="newPassword"
                           class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div>
                    <label class="block text-sm text-gray-500 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword"
                           class="w-full px-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none">
                </div>

            </div>

            <div class="form-actions flex flex-col sm:flex-row gap-3 mt-6">

                <button type="button"
                        class="save-btn w-full sm:w-auto px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm hover:shadow-md transition-all cursor-pointer"
                        onclick="updatePassword()">
                    Update Password
                </button>

                <button type="button"
                        class="cancel-btn w-full sm:w-auto px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 transition shadow-sm cursor-pointer"
                        onclick="clearFields()">
                    Cancel
                </button>

            </div>

        </div>

    </div>
</div>

<script>

    function showToast(message, success = true) {
        Toastify({
            text: message,
            duration: 3000,
            gravity: "top",
            position: "right",
            backgroundColor: success ? "#22c55e" : "#ef4444",
            stopOnFocus: true,
            close: true
        }).showToast();
    }

    function confirmLogout(e) {
        e.preventDefault();

        Swal.fire({
            title: "Logout?",
            text: "You will be signed out of your account.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#4f46e5",
            cancelButtonColor: "#ef4444",
            confirmButtonText: "Yes, logout",
            cancelButtonText: "Stay here",
            reverseButtons: true
        })
        .then(result => {
            if (result.isConfirmed) {
                setTimeout(() => {
                    window.location.href = "/employee/logout";
                }, 300);
            } else {
                showToast("Logout cancelled", false);
            }
        });
    }

    function updatePassword() {

        const currentPassword = document.getElementById("currentPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!currentPassword || !newPassword || !confirmPassword) {
            showToast("Please fill all fields", false);
            return;
        }

        if (newPassword.length < 8) {
            showToast("Password must be at least 8 characters long", false);
            return;
        }

        if (newPassword !== confirmPassword) {
            showToast("Passwords do not match", false);
            return;
        }

        Swal.fire({
            title: "Are you sure?",
            text: "Do you want to update your password?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#4f46e5",
            cancelButtonColor: "#ef4444",
            confirmButtonText: "Yes, update"
        })
        .then(result => {

            if (result.isConfirmed) {

                fetch('/employee/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword,
                        confirmPassword
                    })
                })
                .then(res => res.text())
                .then(msg => {
                    if (msg === "Password updated successfully") {
                        showToast(msg, true);
                        clearFields();
                    } else {
                        showToast(msg, false);
                    }
                })
                .catch(() => {
                    showToast("Something went wrong", false);
                });

            } else {
                showToast("Operation cancelled", false);
            }

        });
    }

    function clearFields() {
        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
    }

</script>

</body>
</html>
